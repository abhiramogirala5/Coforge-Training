<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Time Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>
body{
    background:#fff;
    font-family:"Times New Roman", serif;
}

.container{
    margin-top:40px;
}

table{
    width:900px;
    border:2px solid gray;
    border-collapse:collapse;
    margin:auto;
    border-collapse:separate;
    border-spacing:2px;
}

.table{
    margin-bottom:0;
}

th,td{
    border:2px solid gray !important;
    text-align:center;
    vertical-align:middle !important;
    padding:12px;
    height:55px;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.hours{
    width:160px;
    font-size:20px;
    font-weight:bold;
}

.day{
    font-size:18px;
    font-weight:bold;
}

.lunch{
    font-size:18px;
    font-weight:bold;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="container">

<table class="table table-bordered">

    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <td rowspan="6" class="hours">Hours</td>
        <th class="day">Mon</th>
        <th class="day">Tue</th>
        <th class="day">Wed</th>
        <th class="day">Thu</th>
        <th class="day">Fri</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td colspan="5" class="lunch">LUNCH</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td rowspan="2">Project</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
    </tr>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
