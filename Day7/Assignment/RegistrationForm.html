<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Registration Form</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	font-family: "Times New Roman", serif;
	background: #fff;
}

.container {
	margin-top: 40px;
}

table {
	width: 900px;
	margin: auto;
	border: 2px solid gray;
	border-collapse: separate;
	border-spacing: 2px;
}

th, td {
	border: 1px solid gray !important;
	padding: 8px;
	vertical-align: middle;
}

.title {
	font-size: 24px;
	font-weight: bold;
	text-align: center;
	height: 50px;
}

label {
	font-size: 18px;
	font-weight: normal;
}

.form-control, .form-select {
    width: 200px;
}

input.form-control,
select.form-select {
    height: 35px;
}

textarea.form-control {
    height: 70px;
    resize: none;
}

textarea {
	width: 200px;
	height: 70px;
	resize: none;
}

.btn {
	padding: 4px 15px;
}
</style>
</head>
<body>

	<div class="container">

		<table>

			<tr>
				<th colspan="2" class="title">Registration Form</th>
			</tr>

			<tr>
				<td><label>Student Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Father's Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Mother's Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Date of Birth</label></td>
				<td><input type="date" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Gender</label></td>
				<td>
					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="gender" checked>
						<label class="form-check-label">Male</label>
					</div>

					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="gender">
						<label class="form-check-label">Female</label>
					</div>
				</td>
			</tr>

			<tr>
				<td><label>Email ID</label></td>
				<td><input type="email" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Mobile No.</label></td>
				<td><input type="tel" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Address</label></td>
				<td><textarea class="form-control" rows="5" cols="25"></textarea></td>
			</tr>

			<tr>
				<td><label>State</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>City</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td></td>
				<td>
					<button class="btn btn-light border">Submit</button>
				</td>
			</tr>

		</table>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
