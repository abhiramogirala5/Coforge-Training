<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Bootstrap Grid Layout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>
body{
    font-family: Arial, sans-serif;
    background:#fff;
}

.header{
    height:120px;
    background:#4d74bf;
    border-radius:20px;
}

.column{
    height:280px;
    border-radius:35px;
    border:1px solid #888;
}

.footer{
    height:50px;
    background:#5d95cf;
    border-radius:8px;
}

.col1{
    background:#73af45;
}

.col2{
    background:#f57c2b;
}

.col3{
    background:#ffc107;
}
</style>

</head>
<body>

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col">
            <div class="header d-flex justify-content-center align-items-center">
                <h1 class="display-2 fw-bold m-0">Header</h1>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="column col1 d-flex justify-content-center align-items-center">
                <h1 class="fw-bold">Column 1</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="column col2 d-flex justify-content-center align-items-center">
                <h1 class="fw-bold">Column 2</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="column col3 d-flex justify-content-center align-items-center">
                <h1 class="fw-bold">Column 3</h1>
            </div>
        </div>

    </div>

    <div class="row mt-4">
        <div class="col">
            <div class="footer d-flex justify-content-center align-items-center">
                <h2 class="fw-bold m-0">Footer</h2>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
