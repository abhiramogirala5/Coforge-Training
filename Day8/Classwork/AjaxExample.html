<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Registration Form</title>

<script type="text/javascript">
	function passwordStrength() {

		var password = document.getElementById("pwd").value;

		var req = new XMLHttpRequest();

		req.open("GET",
				"http://localhost:8011/MyWebApplication/PasswordStrengthServlet?pwd="
						+ password, true);

		req.onreadystatechange = function() {

			if (req.readyState == 4 && req.status == 200) {

				document.getElementById("result").innerHTML = req.responseText;

			}
		};

		req.send();

	}

	function checkEmail() {

		var email = document.getElementById("email").value;

		var req = new XMLHttpRequest();

		req.open("GET",
				"http://localhost:8011/MyWebApplication/EmailCheckServelt?email="
						+ email, true);

		req.onreadystatechange = function() {

			if (req.readyState == 4 && req.status == 200) {

				document.getElementById("emailResult").innerHTML = req.responseText;

			}
		};

		req.send();
	}
</script>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	font-family: "Times New Roman", serif;
	background: #fff;
}

.container {
	margin-top: 40px;
}

table {
	width: 900px;
	margin: auto;
	border: 2px solid gray;
	border-collapse: separate;
	border-spacing: 2px;
}

th, td {
	border: 1px solid gray !important;
	padding: 8px;
	vertical-align: middle;
}

.title {
	font-size: 24px;
	font-weight: bold;
	text-align: center;
	height: 50px;
}

label {
	font-size: 18px;
	font-weight: normal;
}

.form-control, .form-select {
	width: 200px;
}

input.form-control, select.form-select {
	height: 35px;
}

textarea.form-control {
	height: 70px;
	resize: none;
}

textarea {
	width: 200px;
	height: 70px;
	resize: none;
}

.btn {
	padding: 4px 15px;
}
</style>
</head>

<body>

	<div class="container">

		<table>

			<tr>
				<th colspan="2" class="title">Registration Form</th>
			</tr>

			<tr>
				<td><label>Student Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Father's Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Mother's Name</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Date of Birth</label></td>
				<td><input type="date" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Gender</label></td>
				<td>
					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="gender" checked>
						<label class="form-check-label">Male</label>
					</div>

					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="gender">
						<label class="form-check-label">Female</label>
					</div>
				</td>
			</tr>

			<tr>
				<td><label>Email ID</label></td>
				<td><input type="email" class="form-control" id="email"
					value="Enter Email" onblur="this.value=''" onkeyup="checkEmail()">
					<span id="emailResult"></span></td>
			</tr>

			<tr>
				<td><label>Password</label></td>
				<td><input type="password" class="form-control" id="pwd"
					onkeyup="passwordStrength()" /> <span id="result"></span></td>
			</tr>

			<tr>
				<td><label>Mobile No.</label></td>
				<td><input type="tel" class="form-control"></td>
			</tr>

			<tr>
				<td><label>Address</label></td>
				<td><textarea class="form-control" rows="5" cols="25"></textarea></td>
			</tr>

			<tr>
				<td><label>State</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td><label>City</label></td>
				<td><input type="text" class="form-control"></td>
			</tr>

			<tr>
				<td></td>
				<td>
					<button class="btn btn-light border">Submit</button>
				</td>
			</tr>

		</table>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
